<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>DeepGuard — AI Deepfake Detection for Images, Video, Audio & Text</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#06b6d4" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DeepGuard" />
    <link rel="apple-touch-icon" href="https://d2xsxph8kpxj0f.cloudfront.net/310519663281703746/C63LRtvb89XZRBRQe8dCdG/icon-192_e888d875.png" />

    <!-- SEO -->
    <meta name="keywords" content="deepfake detection, AI image detector, deepfake video detection, AI voice clone detection, audio deepfake, text AI detection, face swap detection, real-time meeting deepfake, anti-scam, AI fraud prevention, deepfake checker, DALL-E detection, Midjourney detection, ElevenLabs detection" />
    <meta name="description" content="DeepGuard detects AI-generated images, deepfake videos, cloned voices, and AI-written text. Multi-engine analysis with 95%+ accuracy. Free to start." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://deepguard.org/" />

    <!-- Open Graph -->
    <meta property="og:title" content="DeepGuard — AI Deepfake Detection Platform" />
    <meta property="og:description" content="Detect AI-generated images, deepfake videos, voice clones, and AI text. Multi-engine forensic analysis with 95%+ accuracy. Free tier available." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://deepguard.org/" />
    <meta property="og:site_name" content="DeepGuard" />
    <meta property="og:locale" content="en_US" />

    <!-- Open Graph Image -->
    <meta property="og:image" content="https://deepguard.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DeepGuard — AI Deepfake Detection Platform" />
    <meta name="twitter:description" content="Detect AI images, deepfake videos, voice clones & AI text. 95%+ accuracy. Free to start." />
    <meta name="twitter:image" content="https://deepguard.org/og-image.png" />

    <!-- Hreflang for Multi-language Support -->
    <link rel="alternate" hreflang="en" href="https://deepguard.org/" />
    <link rel="alternate" hreflang="zh" href="https://deepguard.org/?lang=zh" />
    <link rel="alternate" hreflang="x-default" href="https://deepguard.org/" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "DeepGuard",
      "applicationCategory": "SecurityApplication",
      "operatingSystem": "Web",
      "description": "AI-powered deepfake detection platform for images, video, audio and text. Multi-engine forensic analysis with heatmap visualization and PDF reports.",
      "url": "https://deepguard.org",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "USD", "description": "Free tier — 10 detections/month" },
        { "@type": "Offer", "price": "19", "priceCurrency": "USD", "description": "Pro — 500 detections/month" },
        { "@type": "Offer", "price": "49", "priceCurrency": "USD", "description": "Business — 3,000 detections/month" }
      ],
      "featureList": [
        "Image deepfake detection with pixel-level heatmap",
        "Video deepfake detection with frame-by-frame analysis",
        "Audio AI voice clone detection",
        "Text AI content detection",
        "Real-time meeting deepfake detection",
        "PDF forensic report export",
        "13 language support"
      ]
    }
    </script>

    <!-- FAQ Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How accurate is DeepGuard?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DeepGuard achieves 95%+ accuracy on benchmark datasets using a multi-engine approach that combines 3 independent AI models."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All uploaded files are processed in isolated environments and deleted immediately after analysis. We never store, train on, or share your content."
          }
        },
        {
          "@type": "Question",
          "name": "What file types are supported?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Images: JPG, PNG, WEBP, GIF. Video: MP4, WebM, MOV, AVI. Audio: MP3, WAV, M4A, OGG, FLAC. Text: plain text input."
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
